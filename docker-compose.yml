version: '3.8'

services:
  # AI Core Backend (Fastify)
  backend:
    image: ghcr.io/jdhert/coviai-backend:latest
    build:
      context: ./workspace-fastify
      dockerfile: Dockerfile
    container_name: ai-core-backend
    environment:
      # Runtime
      - NODE_ENV=production
      - HOST=${HOST:-0.0.0.0}
      - PORT=3101
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REQUEST_TIMEOUT_MS=${REQUEST_TIMEOUT_MS:-30000}
      # Rate Limiting
      - TRUST_PROXY=${TRUST_PROXY:-true}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_TIME_WINDOW_MS=${RATE_LIMIT_TIME_WINDOW_MS:-60000}
      - RATE_LIMIT_CHAT_STREAM_MAX=${RATE_LIMIT_CHAT_STREAM_MAX:-20}
      - RATE_LIMIT_CHAT_MAX=${RATE_LIMIT_CHAT_MAX:-30}
      - RATE_LIMIT_RETRIEVAL_MAX=${RATE_LIMIT_RETRIEVAL_MAX:-60}
      - RATE_LIMIT_FEEDBACK_MAX=${RATE_LIMIT_FEEDBACK_MAX:-120}
      - RATE_LIMIT_ADMIN_MAX=${RATE_LIMIT_ADMIN_MAX:-120}
      - RATE_LIMIT_CONVERSATION_MAX=${RATE_LIMIT_CONVERSATION_MAX:-120}
      - RATE_LIMIT_DEFAULT_MAX=${RATE_LIMIT_DEFAULT_MAX:-300}
      - RATE_LIMIT_CACHE_SIZE=${RATE_LIMIT_CACHE_SIZE:-10000}
      - RATE_LIMIT_ALLOW_LIST=${RATE_LIMIT_ALLOW_LIST:-}
      # Google API
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_MODEL=${GOOGLE_MODEL:-gemini-2.5-flash-lite}
      # Vector Database
      - VECTOR_DB_HOST=${VECTOR_DB_HOST:-VM_HOST_REMOVED}
      - VECTOR_DB_PORT=${VECTOR_DB_PORT:-5432}
      - VECTOR_DB_NAME=${VECTOR_DB_NAME:-ai2}
      - VECTOR_DB_USER=${VECTOR_DB_USER:-novian}
      - VECTOR_DB_PASSWORD=${VECTOR_DB_PASSWORD:-REMOVED}
      - VECTOR_DB_SCHEMA=${VECTOR_DB_SCHEMA:-ai_core}
      - PGVECTOR_SEARCH_ENABLED=${PGVECTOR_SEARCH_ENABLED:-true}
      # Retrieval Settings
      - RETRIEVAL_SCOPE_DEFAULT=${RETRIEVAL_SCOPE_DEFAULT:-all}
      - RETRIEVAL_TOP_K=${RETRIEVAL_TOP_K:-5}
      - RETRIEVAL_CACHE_TTL_MS=${RETRIEVAL_CACHE_TTL_MS:-30000}
      # LLM Settings
      - LLM_PROVIDER=${LLM_PROVIDER:-google}
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-10000}
      - LLM_SKIP_ON_HIGH_CONFIDENCE=${LLM_SKIP_ON_HIGH_CONFIDENCE:-true}
      - LLM_SKIP_MIN_CONFIDENCE=${LLM_SKIP_MIN_CONFIDENCE:-0.75}
      - LLM_TWO_STEP_MAX_CONFIDENCE=${LLM_TWO_STEP_MAX_CONFIDENCE:-0.55}
      - LLM_CANDIDATE_TOP_N=${LLM_CANDIDATE_TOP_N:-3}
      - LLM_MAX_OUTPUT_TOKENS=${LLM_MAX_OUTPUT_TOKENS:-1536}
      - LLM_ANSWER_CACHE_TTL_MS=${LLM_ANSWER_CACHE_TTL_MS:-30000}
      # Embedding Settings
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-google}
      - GOOGLE_EMBEDDING_MODEL=${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-2-preview}
      - GOOGLE_EMBEDDING_OUTPUT_DIM=${GOOGLE_EMBEDDING_OUTPUT_DIM:-768}
      - GOOGLE_EMBEDDING_MIN_INTERVAL_MS=${GOOGLE_EMBEDDING_MIN_INTERVAL_MS:-700}
      - GOOGLE_EMBEDDING_MAX_RETRIES=${GOOGLE_EMBEDDING_MAX_RETRIES:-8}
      - EMBEDDING_MODEL_AUTO_ALIGN=${EMBEDDING_MODEL_AUTO_ALIGN:-true}
      - EMBEDDING_MODEL_RESOLVE_TTL_MS=${EMBEDDING_MODEL_RESOLVE_TTL_MS:-300000}
      - EMBEDDING_FAILURE_COOLDOWN_MS=${EMBEDDING_FAILURE_COOLDOWN_MS:-300000}
      - QUERY_EMBEDDING_CACHE_TTL_MS=${QUERY_EMBEDDING_CACHE_TTL_MS:-3600000}
      # Query Rewriting
      - QUERY_REWRITE_ENABLED=${QUERY_REWRITE_ENABLED:-true}
    expose:
      - "3101"
    restart: unless-stopped
    networks:
      - ai-core-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3101/health').catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (Next.js)
  frontend:
    image: ghcr.io/jdhert/coviai-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-core-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-core-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ai-core-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/csbotservice.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/csbotservice.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-core-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "--no-check-certificate", "https://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ai-core-network:
    driver: bridge

volumes:
  nginx-logs:
