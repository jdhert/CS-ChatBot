name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/coviai-frontend
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/coviai-backend

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      frontend_tag: ${{ steps.meta_frontend.outputs.tags }}
      backend_tag: ${{ steps.meta_backend.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check frontend API routes
        working-directory: ./frontend
        run: |
          npm ci
          npm run check:api-routes

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Frontend 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_FRONTEND }}:cache,mode=max

      - name: Backend 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./workspace-fastify
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_BACKEND }}:cache,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/coviAI

            echo "[1/3] Pull latest code..."
            git pull origin main

            echo "[2/3] Pull new images & restart..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --no-build

            echo "[3/3] Health check..."
            sleep 10
            curl -sf http://localhost/health && echo "[ok] Deploy completed" || echo "[warn] Health check failed"

  production-smoke:
    name: Production Smoke
    runs-on: ubuntu-latest
    needs: deploy

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for public health
        run: |
          set -e
          for attempt in {1..12}; do
            if curl -fsS https://csbotservice.com/health > "$RUNNER_TEMP/health.json"; then
              echo "[ok] Public health is reachable"
              cat "$RUNNER_TEMP/health.json"
              exit 0
            fi

            echo "[wait] Public health not ready yet (${attempt}/12)"
            sleep 10
          done

          echo "[error] Public health check failed after retries"
          exit 1

      - name: Run production smoke
        working-directory: ./workspace-fastify
        env:
          SMOKE_BASE_URL: https://csbotservice.com/api
          SMOKE_QUERY_DELAY_MS: "700"
        run: |
          npm run smoke:prod -- --output "$RUNNER_TEMP/production_smoke.latest.json"

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/health.json
            ${{ runner.temp }}/production_smoke.latest.json
          if-no-files-found: ignore
