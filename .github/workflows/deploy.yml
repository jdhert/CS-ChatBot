name: Deploy to Oracle Cloud VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/coviAI

            echo "[1/4] Pull latest code from main..."
            git pull origin main

            echo "[2/4] Build Docker images..."
            docker compose --env-file .env build

            echo "[3/4] Recreate containers..."
            docker compose --env-file .env up -d --no-build

            echo "[4/4] Run health check..."
            sleep 15
            curl -sf http://localhost/health && echo "[ok] Deploy completed" || echo "[warn] Health check failed. Check docker logs on the VM."
