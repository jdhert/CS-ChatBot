name: Deploy to Oracle Cloud VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/coviAI

            echo "▶ 최신 코드 pull..."
            git pull origin main

            echo "▶ Docker 재빌드 및 재시작..."
            docker compose --env-file .env up -d --build

            echo "▶ 헬스체크..."
            sleep 10
            curl -sf http://localhost/health && echo "✅ 배포 완료" || echo "⚠️ 헬스체크 실패 — 로그 확인 필요"
